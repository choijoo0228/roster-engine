plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.github.choijoo0228'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
}